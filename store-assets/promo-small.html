<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      html, body { width: 440px; height: 280px; margin: 0; overflow: hidden; }
      body {
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 18% 15%, rgba(91, 132, 255, .38), transparent 170px),
          linear-gradient(145deg, #111c34, #090f19 72%);
        color: #f4f7fb;
        font-family: "Segoe UI", "Microsoft JhengHei UI", "Microsoft JhengHei", sans-serif;
      }
      main { display: flex; align-items: center; gap: 24px; padding: 32px; }
      img { width: 104px; height: 104px; filter: drop-shadow(0 14px 24px rgba(0,0,0,.36)); }
      h1 { margin: 0; font-size: 38px; letter-spacing: -.04em; }
    </style>
  </head>
  <body>
    <main>
      <img src="../icons/icon128.png" alt="">
      <h1>Any Subtitle</h1>
    </main>
  </body>
</html>
